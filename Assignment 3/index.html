    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Your Essay... Or Else</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="window-controls">
        <button id="clear">✕</button>
        <button id = "save">
            🗐
        </button>
    </div>

    <div class="container">
        <h1>WRITE YOUR ESSAY ... OR ELSE</h1>

        <div class="editor-wrapper">
            <textarea placeholder="Start writing..."></textarea>
        </div>

        <div class="bottom-bar">

            <div class="tip-box">
                <strong>Tip:</strong>
                Items will regularly spawn on the page. Drag them onto the timer icon to reset the clock and save your work!
        </div>

        <div class="timer-box">
                <span id="timer">20:00</span>
                <div id = "timer-icon" class="timer-check">✓</div>
        </div>

    </div>

</div>

<div id = "spawn-area"></div>


<script src="script.js"></script>
<!--Tried linking javascript file at the bottom this time to make sure html loads first before running timer script etc-->
</body>
</html>
</body>
</html>
