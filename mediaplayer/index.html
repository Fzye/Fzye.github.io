<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media player</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./index_files/reset.css">
  <link rel="stylesheet" href="./index_files/style.css">

  <script src="./index_files/script.js" defer=""></script>
</head>

<body>

  <header>
    <!-- <h1>Media player</h1> -->
  </header>

  <div class="layout">

    <main class="double-border">

    <div class="title-bar double-border">
      <h2>✧˖°.LO-FI PLAYER</h2>
      <p class="title-info">Music for study</p>
      </div>

      <div class="main-screen">
        <video class="video-glow" src="index_files/Lofi1.mp4" id="my-video" muted loop>
        </video>
        
        <audio id = "music-player"> </audio>
      </div>

      <div class="playlist">

        <h1> ⁺⋆˚Change visuals: </h1>
        <!-- Makes it clear to the user what the following buttons will do. Immediately upon landing on the website they will be able to see that the music is not attached to the visuals, and they can customise the visuals to their desire without having to worry about how it will affect the music.-->

        <button class="single-border" id="reflective-vid-button">
          REFLECTIVE
        </button>

        <button class="single-border" id="atmospheric-vid-button">
          ATMOSPHERIC
        </button>

        <button class="single-border" id="calming-vid-button">
          CALMING
        </button>
      </div>
<!-- Visuals consist of short looping videos that have different vibes depending on how they study or relax best. They each carry particularly calming connotations which are noted in their names. Maybe the user feels inspired and reflective, or wants something more silent and calm. -->
      <div id="now-playing"> Now Playing: </div>

      <div class="controls">

        <button id="play-pause-button" class="single-border">
          <img src="./index_files/play--v2.png" alt="" id="play-pause-img">
        </button>

        <button id="mute-unmute-button" class="single-border">
          <img src="./index_files/no-audio--v1.png" alt="" id="mute-unmute-img">
        </button>

        <button id="rewind-button" class="single-border">
          <img src="./index_files/rewind.png" alt="" id="rewind-img">
        </button>

        <button id="shuffle-button" class="single-border">
          <img src="./index_files/shuffle.png" alt="" id="shuffle-img">
        </button>
        <!-- I felt that a shuffle button would be much more fitting for my intended purpose over timestamps, especially as my visuals were unrelated to my audio and I wanted to provide the user with a wide range of music without having to list each track.-->

        <!-- <button id="step1-button" class="double-border">1</button> -->

        <!--<button id="step2-button" class="double-border">2</button> -->

        <div id="progress-bar-container">
          <span id="progress-bar"></span>
        </div>

        <button id="fullscreen-button" class="single-border">
          <img src="./index_files/full-screen--v1.png" alt="" id="fullscreen-img">
        </button>

        <button id="heart-button" class="single-border">
          <img src="./index_files/saved_resource" alt="" id="fullscreen-img">
        </button>

        <div id="likes"></div>
      
      </div>

    </main>

    <aside class="sidebar double-border">
  <!-- All additional customisation is featured in a sidebar, since it is not as important as the main layout I learned from w3schools that this can be semantically sorted with 'aside'. This is where I put the rest of the customisation and information which isn't as necessary, such as the playlist of songs, focus timer, and ambient noise. -->
    <div class= "sidebar-title double-border">
      <h2 style="font-size:30px;"> CUSTOMISE</h2>
    </div>
      <h1>FOCUS TIMER</h1>
      <div class="timer-border">
      <div id="timer">00:00</div>
      </div>
      <div class = "timer-buttons">
      <button id="30-minute" class="single-border">
        30 min
      </button>
      <button id="45-minute" class="single-border">
        45 min
      </button>
      <button id="1-hour" class="single-border">
        1 hr
      </button>
      </div>
      <hr style="margin-top: 10px;">
      <h1>UP NEXT ♪ </h1>
        <div class="up-next" id="up-next">
          </div>
      <hr style = "margin-top: 10px;">
<!-- Introduced a basic timer function to give the user an option to direct their focus. -->
<div class="ambience">
<h1> Ambience ♪ </h1>

<audio id="ambience1" src="sounds/rain.wav" loop></audio>
<audio id="ambience2" src="sounds/fireplace.wav" loop></audio>
<audio id="ambience3" src="sounds/cafe.mp3" loop></audio>
<audio id="ambience4" src="sounds/nature.wav" loop></audio>
<!--ensures that ambience audio loops, so it doesn't randomly stop, as the audios themselves aren't that long, ensures the user doesn't have to do anything manually while studying or relaxing once they have decided on preferences.-->

    <div class="flex-container">
      <button class= "play-button flex-container" id="rain-button"
      data-track="ambience1">
        <img src="./index_files/rain.png" alt="" id="rain-img">
      </button>

      <button class= "play-button flex-container" id="fireplace-button" data-track="ambience2">
        <img src="./index_files/fireplace.png" alt="" id="fireplace-img">
      </button>

      <button class= "play-button flex-container" id="cafe-button" data-track="ambience3">
        <img src="./index_files/cafe.png" alt="" id="cafe-img">
      </button>

      <button class= "play-button flex-container" id="nature-button" data-track="ambience4">
        <img src="./index_files/nature.png" alt="" id="nature-img">
      </button>
    </div>

  <div class="slider-container">
  <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
  </div>

<!-- I felt that with my media player intended to be for relaxation and studying, I mainly needed to prioritise audio over video, as the user would most likely not be directing their attention to whatever visuals were playing, which I decided to keep simple and looping as well, to avoid distraction. Thus I introduced ambience options with a slider, so the user could customise their experience depending on how they study or relax best.-->
</div>
    Adjust volume
    </aside>

  </div>

  <footer>
    <h3>Customise your visuals and music seperately!
    Icons by <a href="https://icons8.com/">Icons8</a> </h3>
    <!--extra info at footer enforces customisation capabilities to the user, as if the website has specifically accomodated for their relaxation/study needs.-->
  </footer>

</body>

</html>
